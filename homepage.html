<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeRoots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .feature-box {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      background-color: white;
    }
    .trade-buttons .btn {
      width: 180px;
    }
    .card-title {
      margin-bottom: 0.5rem;
    }
    .footer-placeholder {
      height: 150px;
      background-color: #eaeaea;
      text-align: center;
      padding-top: 40px;
      color: #666;
    }
  </style>
</head>
<body>

  <!-- Navbar/Header -->
  <nav class="navbar navbar-light bg-success px-3">
    <span class="navbar-brand text-white fw-bold">TradeRoots</span>
    <div>
      <i class="bi bi-person-circle text-white fs-4 me-3"></i>
      <i class="bi bi-bell text-white fs-4 me-3"></i>
      <i class="bi bi-chat-dots text-white fs-4"></i>
    </div>
  </nav>

  <!-- Greeting -->
  <div class="container my-4">
    <h2>Hi, Alex!</h2>
  </div>

  <!-- Trade Buttons -->
  <div class="container trade-buttons text-center mb-4">
    <div class="d-flex justify-content-center gap-3">
      <button class="btn btn-outline-primary">Incoming Trades</button>
      <button class="btn btn-outline-secondary">Outgoing Trades</button>
    </div>
  </div>

  <!-- Feature Icons -->
  <div class="container mb-5">
    <div class="row text-center g-3">
      <div class="col-md-4">
        <div class="feature-box">
          <i class="bi bi-search fs-3"></i>
          <p class="mt-2">Find Skills</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="feature-box">
          <i class="bi bi-people fs-3"></i>
          <p class="mt-2">Trust Networks</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="feature-box">
          <i class="bi bi-arrow-left-right fs-3"></i>
          <p class="mt-2">Exchanges</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Recommendations -->
  <div class="container mb-4">
    <div class="row">
      <div class="col-md-6 mb-3">
        <h5>Recommended for You</h5>
        <div class="card">
          <div class="card-body">
            <h6 class="card-title">John Doe</h6>
            <p class="card-text">
              <span class="badge bg-info">Babysitting</span>
              <span class="badge bg-info">House Cleaning ⭐⭐⭐</span>
              <span class="badge bg-info">Baking ⭐⭐⭐</span><br>
              <small>Requesting: Lawn Mowing</small>
            </p>
            <a href="#" class="btn btn-sm btn-primary">See Profile</a>
          </div>
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <h5>Popular</h5>
        <div class="card">
          <div class="card-body">
            <h6 class="card-title">Jane Smith</h6>
            <p class="card-text">
              <span class="badge bg-info">Tutoring</span>
              <span class="badge bg-info">Pet Sitting ⭐⭐</span><br>
              <small>Requesting: Help with Website</small>
            </p>
            <a href="#" class="btn btn-sm btn-primary">See Profile</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Placeholder -->
  <div class="footer-placeholder">
    Footer Area / Additional Content
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
